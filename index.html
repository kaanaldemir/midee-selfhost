      <h1>midee - free online MIDI player and Synthesia alternative</h1>
      <p>midee is a free, open-source online MIDI player, visualizer, and practice app that runs entirely in your browser. Drop a <strong>.mid</strong>
        file and it plays on a full 88-key piano roll with cascading notes, glow halos, and particle bursts - a
        Synthesia-style piano-roll visualizer, but web-native, design-forward, and free.</p>
      <p>It's also a live MIDI instrument and a simple loop station. Plug in a MIDI keyboard (Web MIDI), or play from
        your laptop keyboard, and jam. Loop a phrase bar-snapped to the metronome, layer takes, record a session, and
        export the result as a frame-accurate <strong>1080p MP4</strong> with audio baked in.</p>
      <p><em>midee requires JavaScript. Please enable JavaScript to use the app.</em></p>

      <h2>What midee does</h2>
      <ul>
        <li><strong>Play MIDI files</strong> in the browser - multi-track, per-track color, full 88 keys.</li>
        <li><strong>Live MIDI play</strong> from Web MIDI controllers or your laptop keyboard (FL Studio layout).</li>
        <li><strong>Learn mode</strong> - play-along wait mode, sight reading, interval training, accuracy, streaks, and weak-note practice.</li>
        <li><strong>Loop station</strong> - bar-snapped to the metronome, layerable, undo stack, export as .mid.</li>
        <li><strong>Session recording</strong> - capture a live performance and bounce to .mid or video.</li>
        <li><strong>MP4 export</strong> - 720p, 1080p, vertical (TikTok, Reels), square, or native. Frame-accurate,
          audio baked in, rendered locally via WebCodecs.</li>
        <li><strong>Themes, instruments, particles</strong> - five themes, sampled piano plus multiple synth and acoustic
          voices, cycleable particle styles.</li>
        <li><strong>Free and open source</strong> - MIT-licensed, 100% client-side, no upload, no account, no watermark.
        </li>
      </ul>

      <h2>Who midee is for</h2>
      <p>Bedroom producers who want a quick piano-roll video for a Reel or YouTube Short. Piano learners who want to
        visualize a new piece. Classical music fans who want to turn a MIDI from the Mutopia project into a shareable
        clip. MIDI keyboard owners who want something beautiful to look at while they jam, without firing up a full DAW.
      </p>

      <h2>How midee compares</h2>
      <p>If you've looked at <strong>Synthesia</strong> (native piano learning), <strong>SeeMusic</strong> (paid video
        visualization), <strong>sightread.dev</strong> (focused browser practice), or <strong>MIDIano</strong> /
        <strong>midi2vidi</strong> (simple MIDI tools), midee is the web-native, open-source alternative - with MIDI
        playback, live mode, Learn mode, looping, recording, and frame-accurate MP4 export in one place.</p>

      <h2>Common questions</h2>
      <p><strong>Is it really free?</strong> Yes. MIT-licensed. No account, no paywall, no watermark.</p>
      <p><strong>Does my MIDI get uploaded?</strong> No. Everything runs in your browser. Your .mid and the rendered MP4
        never leave the machine.</p>
      <p><strong>Can I use my MIDI keyboard?</strong> Yes - any Web MIDI-compatible controller works. Your laptop
        keyboard works too.</p>
      <p><strong>What do I need to run it?</strong> A recent Chromium browser (Chrome 94+), Safari 16.4+, or Firefox
        130+. Desktop recommended; iPad works; phone is limited.</p>
